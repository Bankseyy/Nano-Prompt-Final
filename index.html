<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Nano Prompt Builder (Hosted Viewer)</title>
<style>
body{background:#0b0f0c;color:#e7f2ea;font-family:system-ui;margin:0;padding:20px}
.panel{display:grid;grid-template-columns:320px 1fr;gap:20px;margin-top:20px}
select,input,textarea,button{background:#111a14;color:#e7f2ea;border:1px solid #1c2b22;padding:6px;border-radius:8px}
textarea{width:100%;min-height:320px;font-family:monospace}
.vars div{margin-bottom:8px}
img{max-width:100%;margin-top:10px}
</style>
</head>
<body>

<h2>Nano Banana Prompt Builder (Hosted)</h2>

<select id="presetSelect"></select>

<div class="panel">
<div>
<h3>Variables</h3>
<div id="vars"></div>
</div>

<div>
<h3>Output</h3>
<textarea id="output"></textarea>
<button onclick="copyOutput()">Copy</button>
<button onclick="downloadRef()">Download Reference</button>
<div id="imgContainer"></div>
</div>
</div>

<script>
let data=null;
let values={};

async function loadPresets(){
 const res=await fetch("presets.json",{cache:"no-store"});
 data=await res.json();
 presetSelect.innerHTML="";
 data.presets.forEach(p=>{
  let o=document.createElement("option");
  o.value=p.id;
  o.textContent=p.name;
  presetSelect.appendChild(o);
 });
 render();
}

function currentPreset(){return data.presets.find(p=>p.id===presetSelect.value);}

function detectVars(t){
 const r=/\[([^\]]+)\]/g;let m,v=[];
 while((m=r.exec(t))) if(!v.includes(m[1])) v.push(m[1]);
 return v;
}

function render(){
 let p=currentPreset();
 if(!p) return;
 vars.innerHTML="";
 detectVars(p.template).forEach(name=>{
  let div=document.createElement("div");
  let input=document.createElement("input");
  input.value=values[name]||"";
  input.oninput=()=>{values[name]=input.value;renderOutput();};
  div.innerHTML="<b>"+name+"</b><br>";
  div.appendChild(input);
  vars.appendChild(div);
 });
 renderOutput();
 if(p.reference){
  imgContainer.innerHTML='<img src="'+p.reference+'">';
 } else {
  imgContainer.innerHTML="";
 }
}

function renderOutput(){
 let p=currentPreset();
 let text=p.template;
 detectVars(p.template).forEach(name=>{
  let val=values[name]||"";
  if(val.trim()!==""){
    let safe=name.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    text=text.replace(new RegExp("\\["+safe+"\\]","g"),val);
  }
 });
 output.value=text;
}

function copyOutput(){
 navigator.clipboard.writeText(output.value);
}

function downloadRef(){
 let p=currentPreset();
 if(!p.reference) return;
 let a=document.createElement("a");
 a.href=p.reference;
 a.download=p.reference.split("/").pop();
 a.click();
}

presetSelect.onchange=()=>{values={};render();};

loadPresets();
</script>

</body>
</html>
